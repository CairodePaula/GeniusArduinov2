<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENIUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

:root{
  --red:   #e74c3c;
  --yel:   #f1c40f;
  --grn:   #2ecc71;
  --blu:   #3498db;
  --bg:    #0a0a0a;
  --panel: #111;
  --border:#222;
}

body{
  background: var(--bg);
  color:#fff;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  overflow: hidden;
}

/* scanline overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.15) 2px,
    rgba(0,0,0,.15) 4px
  );
  pointer-events:none;
  z-index:999;
}

h1{
  font-family: 'Black Ops One', sans-serif;
  font-size: 3.5rem;
  letter-spacing: 18px;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 30px rgba(255,255,255,.15);
}

/* ── STATUS ROW ── */
#conn-status{
  font-size: .72rem;
  letter-spacing: 3px;
  color: #444;
  transition: color .3s;
}
#conn-status.ok  { color: var(--grn); text-shadow: 0 0 8px var(--grn); }
#conn-status.err { color: var(--red); text-shadow: 0 0 8px var(--red); }

#fase-display{
  font-size: .75rem;
  letter-spacing: 5px;
  color: #555;
}

/* ── MESSAGE BOX ── */
#status-box{
  min-width: 270px;
  text-align: center;
  padding: 11px 28px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--panel);
  font-size: .82rem;
  letter-spacing: 2px;
  transition: border-color .2s, color .2s, box-shadow .2s;
}
#status-box.jogar  { color:var(--grn); border-color:var(--grn); box-shadow:0 0 12px rgba(46,204,113,.25); }
#status-box.aguarde{ color:var(--yel); border-color:var(--yel); box-shadow:0 0 12px rgba(241,196,15,.2); }
#status-box.acertou{ color:var(--grn); border-color:var(--grn); }
#status-box.errou  { color:var(--red); border-color:var(--red); box-shadow:0 0 14px rgba(231,76,60,.3); }

/* ── GENIUS CIRCLE ── */
.genius-circle{
  width: 320px; height: 320px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px; padding: 8px;
  border-radius: 50%;
  background: #111;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 40px rgba(0,0,0,.8), inset 0 0 20px rgba(0,0,0,.5);
}

.genius-circle::after{
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width: 82px; height: 82px;
  border-radius: 50%;
  background: var(--bg);
  border: 3px solid #1e1e1e;
  z-index: 2;
}

.btn{
  border: none;
  opacity: .15;
  cursor: not-allowed;
  transition: opacity .08s, filter .08s;
  position: relative;
}

.genius-circle.jogar .btn{
  cursor: pointer;
  opacity: .3;
}
.genius-circle.jogar .btn:hover{ opacity:.5; }

.btn.lit{
  opacity: 1 !important;
  filter: brightness(1.8) saturate(1.4);
}
.btn.active{
  opacity: 1 !important;
  filter: brightness(2) saturate(1.6);
}

#b0{ background:var(--red); border-radius:100% 0 0 0; }
#b1{ background:var(--yel); border-radius:0 100% 0 0; }
#b2{ background:var(--grn); border-radius:0 0 0 100%; }
#b3{ background:var(--blu); border-radius:0 0 100% 0; }

/* ── BUTTONS ROW ── */
.btn-row{
  display: flex;
  gap: 12px;
}

#conectar, #reiniciar{
  padding: 11px 28px;
  border-radius: 4px;
  border: 1px solid #333;
  background: transparent;
  color: #888;
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: .78rem;
  letter-spacing: 2px;
  transition: border-color .2s, color .2s;
}
#conectar:hover { border-color: var(--grn); color: var(--grn); }
#reiniciar:hover{ border-color: #666; color: #ccc; }

#conectar.connected{
  border-color: var(--grn);
  color: var(--grn);
}

/* ── NOTE ── */
#web-serial-note{
  font-size:.65rem;
  letter-spacing:1.5px;
  color:#333;
  max-width:320px;
  text-align:center;
  line-height:1.6;
}
</style>
</head>

<body>

<h1>GENIUS</h1>

<div id="conn-status">⬤ DESCONECTADO</div>

<div id="fase-display">FASE 1</div>

<div id="status-box">Conecte o Arduino para começar</div>

<div class="genius-circle" id="circle">
  <button class="btn" id="b0" onclick="pressionar(0)"></button>
  <button class="btn" id="b1" onclick="pressionar(1)"></button>
  <button class="btn" id="b2" onclick="pressionar(2)"></button>
  <button class="btn" id="b3" onclick="pressionar(3)"></button>
</div>

<div class="btn-row">
  <button id="conectar"  onclick="conectar()">⬡ CONECTAR USB</button>
  <button id="reiniciar" onclick="reiniciar()">↺ REINICIAR</button>
</div>

<div id="web-serial-note">
  Requer Chrome / Edge com Web Serial API.<br>
  Conecte o Arduino via USB e clique em CONECTAR USB.
</div>

<script>
// ─────────────────────────────────────────────
// WEB SERIAL
// ─────────────────────────────────────────────

let port     = null;
let writer   = null;
let reader   = null;
let connected = false;

// Fila de respostas pendentes (para cmds B e R)
let pendingResolve = null;
let readBuf = "";

// Estado
let state = {
  fase: 0,
  mostrando: false,
  esperando: false,
  leds: [false,false,false,false]
};

// Rastreia estado anterior para detectar eventos de botão físico
let prevEsperando = false;

const BTNS   = [0,1,2,3].map(i => document.getElementById("b"+i));
const circle  = document.getElementById("circle");
const connEl  = document.getElementById("conn-status");
const statusEl= document.getElementById("status-box");
const faseEl  = document.getElementById("fase-display");
const btnConn = document.getElementById("conectar");


async function conectar(){
  if(!("serial" in navigator)){
    setStatus("Web Serial não suportado neste browser","errou");
    return;
  }

  try{
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    writer = port.writable.getWriter();

    connected = true;
    connEl.textContent = "⬤ CONECTADO";
    connEl.className   = "ok";
    btnConn.className  = "connected";
    btnConn.textContent= "⬡ CONECTADO";

    // Inicia leitura em loop
    lerSerial();

    // Arduino manda enviaEstado() sozinho sempre que algo muda
    // Não precisa de poll — só aguarda boot e pede estado inicial
    await sleep(2000);
    await enviarCmd("E");

  }catch(e){
    connEl.textContent = "⬤ ERRO: " + e.message;
    connEl.className   = "err";
    setStatus("Falha ao conectar","errou");
  }
}


// ── Lê linhas da serial e processa JSON ──
async function lerSerial(){
  const dec = new TextDecoder();
  reader = port.readable.getReader();

  try{
    while(true){
      const { value, done } = await reader.read();
      if(done) break;

      readBuf += dec.decode(value);

      let nl;
      while((nl = readBuf.indexOf("\n")) !== -1){
        const linha = readBuf.slice(0,nl).trim();
        readBuf = readBuf.slice(nl+1);

        if(!linha) continue;

        try{
          const d = JSON.parse(linha);

          // Estado do jogo
          if("fase" in d && "leds" in d){
            state = d;
            atualizarUI();
          }
          // Resposta de comando (B / R)
          else if("ok" in d){
            if(pendingResolve){
              pendingResolve(d);
              pendingResolve = null;
            }
          }
        }catch(_){}
      }
    }
  }catch(e){
    connEl.textContent = "⬤ DESCONECTADO";
    connEl.className   = "err";
    connected = false;
  }finally{
    reader.releaseLock();
  }
}


// ── Envia comando e retorna Promise com resposta ──
async function enviarCmd(cmd){
  if(!writer) return null;
  await writer.write(new TextEncoder().encode(cmd + "\n"));
}


async function cmdComResposta(cmd, timeout=5000){
  const p = new Promise(res => {
    pendingResolve = res;
    setTimeout(()=>{
      if(pendingResolve){ pendingResolve(null); pendingResolve=null; }
    }, timeout);
  });
  await enviarCmd(cmd);
  return p;
}




// ── Atualiza a UI com o estado atual ──
function atualizarUI(){
  faseEl.textContent = "FASE " + (state.fase + 1);

  for(let i=0;i<4;i++){
    BTNS[i].classList.toggle("lit", !!state.leds[i]);
  }

  if(state.mostrando){
    // Se estava esperando e agora está mostrando = botão físico foi pressionado
    // O Arduino já mandou o resultado antes de entrar em mostrando
    // Não sobrescreve mensagem de acertou/errou se ela acabou de aparecer
    if(!prevEsperando){
      setStatus("Observe a sequência...","aguarde");
    }
    bloquear(true);
  }else if(state.esperando){
    setStatus("🟢 SUA VEZ!","jogar");
    bloquear(false);
  }else if(!state.mostrando && !state.esperando){
    // Transitório (game over animando, por ex.)
    bloquear(true);
  }

  prevEsperando = state.esperando;
}


// ── Clique em botão colorido ──
let clicando = false;
async function pressionar(n){
  if(clicando || !connected) return;
  if(!circle.classList.contains("jogar")) return;

  clicando = true;
  BTNS[n].classList.add("active");
  setTimeout(()=> BTNS[n].classList.remove("active"), 200);

  const resp = await cmdComResposta("B" + n);

  if(resp && resp.ok){
    setStatus("✓ Acertou!","acertou");
  }else{
    setStatus("✗ Errou!","errou");
  }

  clicando = false;
}


async function reiniciar(){
  if(!connected) return;
  bloquear(true);
  setStatus("Reiniciando...","aguarde");
  await cmdComResposta("R");
}


// ── Helpers ──
function setStatus(msg, cls){
  statusEl.textContent = msg;
  statusEl.className   = cls;
}

function bloquear(sim){
  circle.classList.toggle("jogar", !sim);
}

function sleep(ms){ return new Promise(r => setTimeout(r,ms)); }
</script>

</body>
</html>
